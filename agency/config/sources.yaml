# Data source configurations for OSINT Collector

rss_feeds:
  - name: Reuters World
    url: "https://www.reutersagency.com/feed/?best-topics=world&post_type=best"
    type: news
  - name: AP News World
    url: "https://rsshub.app/apnews/topics/world-news"
    type: news
  - name: BBC World
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    type: news
  - name: Al Jazeera
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    type: news
  - name: CNN World
    url: "http://rss.cnn.com/rss/edition_world.rss"
    type: news
  - name: The Guardian World
    url: "https://www.theguardian.com/world/rss"
    type: news

government_feeds:
  - name: WHO Disease Outbreak
    url: "https://www.who.int/rss-feeds/disease-outbreak-news.xml"
    type: health
  - name: US State Dept Travel
    url: "https://www.state.gov/feed/"
    type: travel_advisory
  - name: FEMA Alerts
    url: "https://www.fema.gov/about/news/releasessyndication"
    type: disaster
  - name: ECDC Communicable Diseases
    url: "https://www.ecdc.europa.eu/en/rss"
    type: health
  - name: GDACS Alerts
    url: "https://www.gdacs.org/xml/rss.xml"
    type: disaster

ngo_feeds:
  - name: ReliefWeb
    url: "https://reliefweb.int/updates/all.xml"
    type: humanitarian
  - name: Red Cross
    url: "https://www.icrc.org/en/rss.xml"
    type: humanitarian
  - name: Amnesty International
    url: "https://www.amnesty.org/en/feed/"
    type: human_rights

social_signals:
  - name: Twitter/X Breaking News List
    type: social
  - name: Reddit WorldNews
    url: "https://www.reddit.com/r/worldnews/.rss"
    type: social
